name: Deploy mathreact to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-neumathe
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}

    defaults:
      run:
        working-directory: mathreact

    steps:
      - name: Check deploy secrets
        if: env.VPS_HOST == '' || env.VPS_USER == '' || env.VPS_SSH_KEY == ''
        working-directory: .
        run: |
          echo "Missing GitHub Actions secrets: VPS_HOST, VPS_USER, VPS_SSH_KEY"
          echo "Skipping deployment. Configure secrets, then run this workflow manually or push again."

      - name: Checkout repository
        if: env.VPS_HOST != '' && env.VPS_USER != '' && env.VPS_SSH_KEY != ''
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: env.VPS_HOST != '' && env.VPS_USER != '' && env.VPS_SSH_KEY != ''
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mathreact/package-lock.json

      - name: Install dependencies
        if: env.VPS_HOST != '' && env.VPS_USER != '' && env.VPS_SSH_KEY != ''
        run: npm ci

      - name: Build
        if: env.VPS_HOST != '' && env.VPS_USER != '' && env.VPS_SSH_KEY != ''
        run: VITE_DATA_VERSION="${GITHUB_SHA}-${GITHUB_RUN_NUMBER}" npm run build

      - name: Prepare deploy package
        if: env.VPS_HOST != '' && env.VPS_USER != '' && env.VPS_SSH_KEY != ''
        working-directory: .
        run: |
          rm -rf deploy-package
          mkdir deploy-package
          cp -a mathreact/dist/. deploy-package/

      - name: Verify JSON content in dist
        if: env.VPS_HOST != '' && env.VPS_USER != '' && env.VPS_SSH_KEY != ''
        working-directory: .
        run: |
          echo "Verifying neumathe_chapter_296_raw.json locally..."
          if grep -Fq '$$' deploy-package/data/chapters/neumathe_chapter_296_raw.json; then
            echo "Successfully found \$\$ in local dist file."
          else
            echo "Error: \$\$ not found in local dist neumathe_chapter_296_raw.json! The build data might be stale."
            exit 1
          fi

      - name: Clean remote web directory
        if: env.VPS_HOST != '' && env.VPS_USER != '' && env.VPS_SSH_KEY != ''
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          key: ${{ env.VPS_SSH_KEY }}
          script: |
            set -e
            mkdir -p /var/www/neumathe
            rm -rf /var/www/neumathe/*

      - name: Upload build files
        if: env.VPS_HOST != '' && env.VPS_USER != '' && env.VPS_SSH_KEY != ''
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          key: ${{ env.VPS_SSH_KEY }}
          source: deploy-package/*
          target: /var/www/neumathe
          strip_components: 1

      - name: Upload nginx config
        if: env.VPS_HOST != '' && env.VPS_USER != '' && env.VPS_SSH_KEY != ''
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          key: ${{ env.VPS_SSH_KEY }}
          source: neumathe.conf
          target: /tmp

      - name: Verify deployment
        if: env.VPS_HOST != '' && env.VPS_USER != '' && env.VPS_SSH_KEY != ''
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          key: ${{ env.VPS_SSH_KEY }}
          script: |
            set -e
            mv /tmp/neumathe.conf /etc/nginx/sites-available/neumathe
            ln -sf /etc/nginx/sites-available/neumathe /etc/nginx/sites-enabled/neumathe
            rm -f /etc/nginx/sites-enabled/default
            test -f /var/www/neumathe/index.html
            nginx -t
            systemctl reload nginx || systemctl restart nginx
            
            echo "Verifying neumathe_chapter_296_raw.json on VPS..."
            if grep -Fq '$$' /var/www/neumathe/data/chapters/neumathe_chapter_296_raw.json; then
              echo "VPS data is updated and contains \$\$."
            else
              echo "Error: VPS data is still old (missing \$\$). Actions deployed but data is stale!"
              exit 1
            fi
            
            echo DEPLOY_OK
